name: Build CachyOS Kernel

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream ref to build
        required: false
        default: master
      processor_opt:
        description: Kernel CPU target
        required: false
        default: generic_v3
  schedule:
    - cron: '0 0 */5 * *'

concurrency:
  group: build-cachyos-kernel
  cancel-in-progress: true

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      upstream_hash: ${{ steps.check.outputs.upstream_hash }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Check upstream for changes
        id: check
        run: |
          upstream_hash=$(git ls-remote https://github.com/CachyOS/linux-cachyos.git HEAD | awk '{print $1}')

          last_built=""
          if git fetch --depth 1 origin tracking 2>/dev/null; then
            last_built=$(git show FETCH_HEAD:.tracking/last-built-commit 2>/dev/null || true)
          fi

          echo "upstream=$upstream_hash last_built=$last_built"

          if [[ "$upstream_hash" == "$last_built" ]]; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi
          echo "upstream_hash=$upstream_hash" >> "$GITHUB_OUTPUT"

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.needs_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:base-devel

    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm archlinux-keyring
          pacman -S --noconfirm \
            base-devel git sudo perl bc cpio gettext libelf pahole python rust rust-bindgen rust-src pacman-contrib \
            tar xz zstd clang llvm lld curl patch flex bison rsync kmod inetutils xmlto openssl
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Create builder user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Apply workflow input overrides
        if: github.event_name == 'workflow_dispatch'
        env:
          UPSTREAM_REF: ${{ github.event.inputs.upstream_ref }}
          PROCESSOR_OPT: ${{ github.event.inputs.processor_opt }}
        run: |
          sed -i "s|^UPSTREAM_REF=.*|UPSTREAM_REF=$UPSTREAM_REF|" config/build.env
          sed -i "s|^PROCESSOR_OPT=.*|PROCESSOR_OPT=$PROCESSOR_OPT|" config/build.env

      - name: Build packages
        run: sudo -u builder bash -lc "cd '$GITHUB_WORKSPACE' && ./scripts/build-kernel.sh"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-cachyos-bore-lto-${{ github.run_number }}
          path: |
            out/*.pkg.tar.zst
            out/*.pkg.tar.zst.sig

      - name: Sync upstream bore dir
        if: github.event_name == 'schedule'
        run: |
          git config user.name "primalkz"
          git config user.email "44187697+primalkz@users.noreply.github.com"
          git clone --depth=1 https://github.com/CachyOS/linux-cachyos.git /tmp/upstream
          rm -rf upstream/linux-cachyos-bore
          mkdir -p upstream
          cp -a /tmp/upstream/linux-cachyos-bore upstream/
          git add upstream/linux-cachyos-bore
          if git diff --cached --quiet; then
            echo "no upstream changes to sync"
          else
            git commit -m "upstream: sync linux-cachyos-bore @ ${{ needs.check-upstream.outputs.upstream_hash }}"
            git pull --rebase origin master
            git push origin master
          fi

      - name: Update tracking branch
        if: github.event_name == 'schedule'
        run: |
          git config user.name "primalkz"
          git config user.email "44187697+primalkz@users.noreply.github.com"
          git checkout --orphan tracking
          git rm -rf --cached . >/dev/null 2>&1 || true
          mkdir -p .tracking
          echo "${{ needs.check-upstream.outputs.upstream_hash }}" > .tracking/last-built-commit
          git add .tracking/last-built-commit
          git commit -m "tracking: update last-built-commit"
          git push --force origin tracking
